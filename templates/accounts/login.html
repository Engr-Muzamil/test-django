{% extends "base.html" %}
{% block title %}Login{% endblock %}

{% block content %}
  <h2>Login</h2>

  {% if form.errors %}
    <p style="color:red;">Invalid credentials. Try again.</p>
  {% endif %}

  <form method="post">
    {% csrf_token %}
    {{ form.as_p }}

    {% if next %}
      <input type="hidden" name="next" value="{{ next }}">
    {% endif %}

    <button type="submit">Login</button>
  </form>
{% endblock %}
