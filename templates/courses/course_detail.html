{% extends "base.html" %}
{% block content %}
<h2>{{ course.title }}</h2>
<p>{{ course.description }}</p>

{% if course.thumbnail %}
  <img src="{{ course.thumbnail.url }}" width="250">
{% endif %}

{% if user.is_authenticated %}
  {% if enrolled %}
    <p><strong>Enrolled</strong></p>
  {% else %}
    <a href="{% url 'enroll' slug=course.slug %}">Enroll Now</a>
  {% endif %}
{% else %}
  <p>Please <a href="{% url 'login' %}">login</a> to enroll.</p>
{% endif %}
{% endblock %}
