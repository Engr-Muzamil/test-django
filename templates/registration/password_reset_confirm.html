{% extends "base.html" %}
{% block title %}Set New Password{% endblock %}

{% block content %}
  <h2>Set a new password</h2>

  {% if validlink %}
    <form method="post">
      {% csrf_token %}
      {{ form.as_p }}
      <button type="submit">Reset password</button>
    </form>
  {% else %}
    <p style="color:red;">This reset link is invalid or expired.</p>
  {% endif %}
{% endblock %}
