{% extends "base.html" %}
{% block title %}Reset Password{% endblock %}

{% block content %}
  <h2>Reset Password</h2>
  <p>Enter your email. We'll send a reset link.</p>

  <form method="post">
    {% csrf_token %}
    {{ form.as_p }}
    <button type="submit">Send reset link</button>
  </form>
{% endblock %}
