{% extends "base.html" %}
{% block title %}Posts{% endblock %}

{% block content %}
<h2>All Posts</h2>

<a href="{% url 'posts:post_create' %}">Create New Post</a>

<hr>

{% for post in posts %}
  <div style="margin-bottom:20px;">
    <h3>{{ post.title }}</h3>
    <p>{{ post.body }}</p>
    <small>By {{ post.author.username }}</small>
  </div>
  <hr>
{% empty %}
  <p>No posts yet.</p>
{% endfor %}

{% endblock %}
